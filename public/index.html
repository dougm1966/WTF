<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTF — PDF to Text</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <h1 class="logo">WTF<span class="logo-dot">.</span></h1>
                <span class="logo-sub">PDF &rarr; Text</span>
            </div>
            <div class="topbar-stats">
                <div class="stat-pill">
                    <i class="fas fa-file-alt"></i>
                    <span id="statFiles">0</span>
                    <label>files</label>
                </div>
                <div class="stat-pill">
                    <i class="fas fa-layer-group"></i>
                    <span id="statPages">0</span>
                    <label>pages</label>
                </div>
                <div class="stat-pill">
                    <i class="fas fa-microchip"></i>
                    <span id="statTokens">0</span>
                    <label>tokens</label>
                </div>
                <div class="stat-pill cost">
                    <i class="fas fa-dollar-sign"></i>
                    <span id="statCost">0.00</span>
                    <label>cost</label>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Upload Section -->
            <section class="upload-section" id="uploadSection">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-content">
                        <div class="upload-icon-wrap">
                            <i class="fas fa-cloud-upload-alt"></i>
                        </div>
                        <h3>Drop PDFs here</h3>
                        <p>or click to browse</p>
                        <button class="browse-btn" id="browseBtn">
                            <i class="fas fa-folder-open"></i> Choose Files
                        </button>
                        <input type="file" id="fileInput" multiple accept=".pdf">
                    </div>
                </div>
                <div class="upload-meta">
                    <span><i class="fas fa-shield-alt"></i> OCR + AI Vision</span>
                    <span><i class="fas fa-file-pdf"></i> Up to 100MB</span>
                    <span><i class="fas fa-layer-group"></i> Batch processing</span>
                </div>
            </section>

            <!-- File List Section -->
            <section class="panel" id="fileListSection" style="display: none;">
                <div class="panel-header">
                    <h2><i class="fas fa-list"></i> Queue</h2>
                    <div class="panel-actions">
                        <button class="btn btn-ghost" id="addMoreBtn">
                            <i class="fas fa-plus"></i> Add
                        </button>
                        <button class="btn btn-accent" id="convertBtn">
                            <i class="fas fa-bolt"></i> Convert
                        </button>
                        <button class="btn btn-ghost" id="clearBtn">
                            <i class="fas fa-trash"></i> Clear
                        </button>
                    </div>
                </div>
                <div class="file-list" id="fileList"></div>
            </section>

            <!-- Progress Section -->
            <section class="panel" id="progressSection" style="display: none;">
                <div class="panel-header">
                    <h2><i class="fas fa-spinner fa-spin"></i> Converting</h2>
                </div>
                <div class="progress-bar-wrap">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="progress-pct" id="progressText">0%</span>
                </div>
                <div class="status-log" id="statusMessages"></div>
            </section>

            <!-- Results Section -->
            <section class="panel" id="resultsSection" style="display: none;">
                <div class="panel-header">
                    <h2><i class="fas fa-check-circle"></i> Done</h2>
                    <div class="panel-actions">
                        <button class="btn btn-accent" id="downloadAllBtn">
                            <i class="fas fa-download"></i> Download ZIP
                        </button>
                        <button class="btn btn-ghost" id="newConversionBtn">
                            <i class="fas fa-plus"></i> New
                        </button>
                    </div>
                </div>
                <div id="resultsSummary" class="results-summary"></div>
                <div id="individualDownloads" class="individual-downloads"></div>
            </section>

            <!-- Error Section -->
            <section class="panel" id="errorSection" style="display: none;">
                <div class="panel-header">
                    <h2><i class="fas fa-exclamation-triangle"></i> Error</h2>
                </div>
                <div class="error-msg" id="errorMessage"></div>
                <button class="btn btn-accent" id="retryBtn">
                    <i class="fas fa-redo"></i> Retry
                </button>
            </section>
        </main>

        <!-- Footer -->
        <footer class="bottombar">
            <span class="pricing-note">
                <i class="fas fa-info-circle"></i>
                GPT-4o Vision: $2.50/1M input &middot; $10.00/1M output tokens
            </span>
            <span class="powered-by">Built with AI Agent Team</span>
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner">
            <i class="fas fa-circle-notch fa-spin"></i>
            <p>Processing...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
